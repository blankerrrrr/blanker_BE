services:
  api:
    image: ${DOCKERHUB_USERNAME}/${DOCKERHUB_IMAGE}:latest
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      KOREA_WEBTOON_API_URL: http://webtoon-api:3000
    depends_on:
      - postgres
      - redis
      - webtoon-api

  webtoon-api:
    build:
      context: ./webtoon-api
    expose:
      - "3000"
    environment:
      NODE_ENV: development
      PORT: 3000

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
    volumes:
      - ./nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
