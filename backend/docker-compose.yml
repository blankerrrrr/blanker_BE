services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://blanker:blanker@postgres:5432/blanker
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: local-development-secret
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blanker
      POSTGRES_USER: blanker
      POSTGRES_PASSWORD: blanker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
